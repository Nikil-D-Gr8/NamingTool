{% extends "naming/base.html" %}
{% block title %}Delete {{ resource.name }} — NamingTool{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Delete Resource</h1>
</div>
<div class="card">
    <p>Are you sure you want to delete <strong><code>{{ resource.name }}</code></strong> ({{ resource.rid }})?</p>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post" style="margin-top:1.5rem;">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'resource_detail' resource.pk %}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
