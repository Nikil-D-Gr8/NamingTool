{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resource Naming Tool — generate canonical names and build tags for your infrastructure resources.">
    <title>{% block title %}NamingTool{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%2306b6d4%22>⬡</text></svg>">
    <link rel="stylesheet" href="{% static 'naming/css/style.css' %}">
</head>
<body>
    <!-- Ambient background glow -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-text">NamingTool</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="{% url 'home' %}" class="nav-link {% block nav_home %}{% endblock %}" id="nav-home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <span>Generator</span>
                </a>
            </li>
            <li>
                <a href="{% url 'vocabulary_manage' %}" class="nav-link {% block nav_vocab %}{% endblock %}" id="nav-vocab">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span>Vocabulary</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <span class="version-badge">Stateless · YAML-driven</span>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'naming/js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
